worker_processes auto;
pid /data/run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format db_aio_json escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr"}';

    access_log /dev/stdout db_aio_json;
    sendfile on;
    keepalive_timeout 65;

    client_body_temp_path /data/run/nginx/client_body;
    proxy_temp_path /data/run/nginx/proxy;
    fastcgi_temp_path /data/run/nginx/fastcgi;
    uwsgi_temp_path /data/run/nginx/uwsgi;
    scgi_temp_path /data/run/nginx/scgi;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $http_x_forwarded_proto;
        '' $scheme;
    }

    server {
        listen 7860;
        server_name _;

        client_max_body_size 50M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy "frame-ancestors 'self' https://huggingface.co https://*.huggingface.co" always;

        # Health endpoints
        location = /nginx-health {
            default_type text/plain;
            return 200 "ok\n";
        }

        location = /healthz {
            proxy_pass http://127.0.0.1:8081/healthz;
        }

        # Ops service
        location = /_ops {
            return 308 /_ops/$is_args$args;
        }

        location /_ops/ {
            proxy_pass http://127.0.0.1:8081/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        location = /signup {
            return 308 /signin/$is_args$args;
        }

        location = /signup/ {
            return 308 /signin/$is_args$args;
        }

        # NocoDB WebSocket
        location /socket.io/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_cache_bypass $http_upgrade;
        }

        location = /__db_aio/nocodb-locale-init.js {
            alias /data/run/db-aio-public/nocodb-locale-init.js;
            default_type application/javascript;
            add_header Cache-Control "no-store" always;
        }

        # NocoDB (default)
        location / {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header Accept-Encoding "";

            sub_filter_once on;
            sub_filter '</head>' '<script src="/__db_aio/nocodb-locale-init.js"></script></head>';

            proxy_pass http://127.0.0.1:8080;
        }
    }
}
